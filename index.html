<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecurePay - Add Funds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0B0F14;
  color: #E5E7EB;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
  background: #121821;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.logo {
  font-weight: 600;
  font-size: 18px;
}

.balance {
  font-size: 14px;
  color: #9CA3AF;
}

/* Title */
h1 {
  font-size: 22px;
  margin: 15px 0;
}

/* Section */
.section {
  margin-top: 20px;
}

.section-title {
  font-size: 14px;
  color: #9CA3AF;
  margin-bottom: 10px;
}

/* Amount buttons */
.amounts {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.amount {
  padding: 12px;
  text-align: center;
  border-radius: 12px;
  background: #1A222C;
  cursor: pointer;
  transition: 0.2s;
}

.amount.active {
  border: 1px solid #3B82F6;
  background: #1E293B;
}

.amount:hover {
  transform: translateY(-2px);
}

/* Input */
.input-box {
  margin-top: 12px;
  padding: 14px;
  background: #1A222C;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
}

/* Payment methods */
.method {
  background: #1A222C;
  border-radius: 14px;
  padding: 15px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid transparent;
}

.method.active {
  border: 1px solid #3B82F6;
  background: #1E293B;
}

.method-title {
  font-weight: 500;
}

.method-sub {
  font-size: 12px;
  color: #9CA3AF;
  margin-top: 5px;
}

/* Summary */
.summary {
  background: #1A222C;
  border-radius: 14px;
  padding: 15px;
  margin-top: 10px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
  font-size: 14px;
}

.total {
  font-size: 16px;
  font-weight: 600;
  margin-top: 10px;
}

/* Button */
.btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #3B82F6, #06B6D4);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  opacity: 0.9;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 12px;
  color: #6B7280;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">SecurePay</div>
    <div class="balance">$1,240.50</div>
  </div>

  <h1>Add Funds</h1>

  <!-- Amount -->
  <div class="section">
    <div class="section-title">1. Select Amount</div>

    <div class="amounts">
      <div class="amount">$50</div>
      <div class="amount">$100</div>
      <div class="amount active">$250</div>
      <div class="amount">$500</div>
    </div>

    <div class="input-box">
      <span>$250.00</span>
      <span>USD</span>
    </div>
  </div>

  <!-- Payment -->
  <div class="section">
    <div class="section-title">2. Payment Method</div>

    <div class="method">
      <div class="method-title">Bitcoin</div>
      <div class="method-sub">Fast • 5–10 min • Network fee</div>
    </div>

    <div class="method active">
      <div class="method-title">PayPal</div>
      <div class="method-sub">Instant • 2.9% fee</div>
    </div>

    <div class="method">
      <div class="method-title">Gift Card</div>
      <div class="method-sub">Manual • up to 1 hr</div>
    </div>
  </div>

  <!-- Summary -->
  <div class="section">
    <div class="section-title">3. Summary</div>

    <div class="summary">
      <div class="summary-row">
        <span>Deposit</span>
        <span>$250.00</span>
      </div>
      <div class="summary-row">
        <span>Fee</span>
        <span>$2.50</span>
      </div>
      <div class="summary-row">
        <span>Tax</span>
        <span>$0.00</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span>$252.50</span>
      </div>
    </div>
  </div>

  <button class="btn">Continue to Payment</button>

  <div class="footer">
    🔒 Secure payment • No hidden fees
  </div>

</div>

</body>
</html>
