<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePay Premium | Add Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #05070a; 
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #05070a 100%);
        }
        .premium-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 24px; 
        }
        .btn-main { 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4); }
        
        .method-card { 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s ease;
        }
        .method-card.active { 
            border: 2px solid #3b82f6; 
            background: rgba(59, 130, 246, 0.08); 
        }
        
        #gift-code-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
        }
        #gift-code-container.show {
            max-height: 100px;
            opacity: 1;
            margin-top: 12px;
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-lg w-full premium-card p-8 md:p-10 shadow-2xl">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 bg-blue-600/20 rounded-xl flex items-center justify-center border border-blue-500/30">
                    <i class="fas fa-shield-halved text-blue-400"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">SecurePay<span class="text-blue-500">.</span></span>
            </div>
            <div class="text-[10px] uppercase tracking-widest text-gray-500 font-bold bg-white/5 px-3 py-1 rounded-full border border-white/5">
                Encrypted Session
            </div>
        </div>

        <div class="space-y-8">
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="h-6 w-6 rounded-full bg-blue-600 text-[10px] flex items-center justify-center font-bold">1</span>
                    <h2 class="text-sm font-semibold text-gray-300">Choose Method</h2>
                </div>
                
                <div class="grid gap-3">
                    <div onclick="selectMethod('bitcoin')" id="method-bitcoin" class="method-card p-4 rounded-2xl flex items-center justify-between group cursor-pointer">
                        <div class="flex items-center gap-4">
                            <i class="fab fa-bitcoin text-2xl text-orange-400"></i>
                            <div>
                                <p class="font-bold text-sm">Bitcoin Network</p>
                                <p class="text-[10px] text-gray-500">Manual review • $0.00 Fee</p>
                            </div>
                        </div>
                    </div>

                    <div onclick="selectMethod('paypal')" id="method-paypal" class="method-card p-4 rounded-2xl flex items-center justify-between group cursor-pointer">
                        <div class="flex items-center gap-4">
                            <i class="fab fa-paypal text-2xl text-blue-400"></i>
                            <div>
                                <p class="font-bold text-sm">PayPal Checkout</p>
                                <p class="text-[10px] text-gray-500">Instant • $0.00 Fee</p>
                            </div>
                        </div>
                    </div>

                    <div onclick="selectMethod('gift')" id="method-gift" class="method-card active p-4 rounded-2xl cursor-pointer">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <i class="fas fa-gift text-2xl text-emerald-400"></i>
                                <div>
                                    <p class="font-bold text-sm">Digital Gift Card</p>
                                    <p class="text-[10px] text-gray-500">Manual review • $0.00 Fee</p>
                                </div>
                            </div>
                            <i class="fas fa-check-circle text-blue-500" id="gift-check"></i>
                        </div>
                        
                        <div id="gift-code-container" class="show">
                            <input type="text" id="gift-input" placeholder="Enter Gift Card Code" 
                                   class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500/50 text-center tracking-widest font-mono uppercase">
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="h-6 w-6 rounded-full bg-blue-600 text-[10px] flex items-center justify-center font-bold">2</span>
                    <h2 class="text-sm font-semibold text-gray-300">Set Amount</h2>
                </div>

                <div class="grid grid-cols-4 gap-2 mb-4 text-xs font-semibold">
                    <button onclick="updateAmount(50)" class="preset-btn bg-white/5 py-2.5 rounded-xl hover:bg-white/10 transition-all border border-white/5">$50</button>
                    <button onclick="updateAmount(100)" class="preset-btn bg-white/5 py-2.5 rounded-xl hover:bg-white/10 transition-all border border-white/5">$100</button>
                    <button onclick="updateAmount(250)" class="preset-btn bg-blue-600 py-2.5 rounded-xl transition-all border border-blue-500">$250</button>
                    <button onclick="updateAmount(500)" class="preset-btn bg-white/5 py-2.5 rounded-xl hover:bg-white/10 transition-all border border-white/5">$500</button>
                </div>

                <div class="relative group">
                    <input type="number" id="amount-field" value="250.00" oninput="sync()" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-12 text-2xl font-bold focus:outline-none focus:border-blue-500 transition-all">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-xl font-medium">$</span>
                    <span class="absolute right-5 top-1/2 -translate-y-1/2 text-[10px] font-bold text-gray-500 tracking-widest">USD</span>
                </div>
            </section>

            <section class="bg-black/20 rounded-2xl p-5 border border-white/5 space-y-3">
                <div class="flex justify-between text-sm text-gray-400"><span>Subtotal</span><span id="sub">$250.00</span></div>
                <div class="flex justify-between text-sm text-emerald-400"><span>Processing Fee</span><span>$0.00</span></div>
                <div class="pt-3 border-t border-white/10 flex justify-between items-center">
                    <span class="text-xs text-gray-400 uppercase font-bold tracking-wider">Total</span>
                    <span class="text-2xl font-bold text-white" id="total">$250.00</span>
                </div>
            </section>

            <div class="space-y-4">
                <button id="pay-btn" onclick="process()" class="w-full py-5 rounded-2xl font-bold text-lg btn-main flex items-center justify-center gap-3">
                    <div id="loader" class="spinner hidden"></div>
                    <span id="btn-text">Complete Deposit</span>
                </button>
                <div class="text-center opacity-40 grayscale flex justify-center gap-4 text-xl">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fab fa-cc-paypal"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const amountField = document.getElementById('amount-field');
        const sub = document.getElementById('sub');
        const total = document.getElementById('total');
        const giftContainer = document.getElementById('gift-code-container');

        function sync() {
            const v = parseFloat(amountField.value || 0).toFixed(2);
            sub.innerText = `$${v}`;
            total.innerText = `$${v}`;
        }

        function updateAmount(a) {
            amountField.value = a.toFixed(2);
            document.querySelectorAll('.preset-btn').forEach(b => {
                b.className = b.innerText === `$${a}` ? 'preset-btn bg-blue-600 py-2.5 rounded-xl transition-all border border-blue-500' : 'preset-btn bg-white/5 py-2.5 rounded-xl hover:bg-white/10 transition-all border border-white/5';
            });
            sync();
        }

        function selectMethod(m) {
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            const giftCheck = document.getElementById('gift-check');
            
            if(giftCheck) giftCheck.remove();

            const activeCard = document.getElementById(`method-${m}`);
            activeCard.classList.add('active');
            
            // Add checkmark
            const i = document.createElement('i');
            i.className = 'fas fa-check-circle text-blue-500';
            i.id = m + '-check';
            activeCard.querySelector('.flex').appendChild(i);

            // Toggle Gift Input
            if(m === 'gift') {
                giftContainer.classList.add('show');
            } else {
                giftContainer.classList.remove('show');
            }
        }

        function process() {
            const btn = document.getElementById('pay-btn');
            btn.disabled = true;
            document.getElementById('btn-text').innerText = "Processing...";
            document.getElementById('loader').classList.remove('hidden');
            setTimeout(() => {
                alert("Deposit request submitted successfully!");
                location.reload();
            }, 2000);
        }
    </script>
</body>
</html>
