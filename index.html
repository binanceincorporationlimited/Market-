<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #12161c; color: #ebecf0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .active-tab { border-bottom: 3px solid #f0b90b; color: #ffffff; }
        .filter-pill { background-color: #2b3139; border-radius: 4px; padding: 4px 12px; font-size: 13px; white-space: nowrap; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Price Animation */
        .price-flash-up { animation: flashUp 0.5s ease-out; }
        .price-flash-down { animation: flashDown 0.5s ease-out; }
        @keyframes flashUp { 0% { color: #2ebd85; } 100% { color: #ebecf0; } }
        @keyframes flashDown { 0% { color: #f6465d; } 100% { color: #ebecf0; } }
        
        .price-up-bg { background-color: #2ebd85; transition: background-color 0.3s; }
        .price-down-bg { background-color: #f6465d; transition: background-color 0.3s; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-md mx-auto border-x border-gray-800 shadow-2xl overflow-hidden">

    <div class="p-4 pb-2">
        <div class="relative flex items-center bg-[#2b3139] rounded-lg px-3 py-2">
            <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2"></i>
            <input type="text" id="coinSearch" placeholder="Search Coin Pairs" class="bg-transparent border-none outline-none text-sm w-full text-white placeholder-gray-500">
            <i data-lucide="more-horizontal" class="w-5 h-5 text-gray-400 ml-2"></i>
        </div>
    </div>
    
    <nav class="flex gap-6 px-4 py-2 text-gray-400 font-medium text-lg overflow-x-auto no-scrollbar">
        <span>Favorites</span>
        <span class="active-tab">Market</span>
        <span>Alpha</span>
        <span>Grow</span>
        <span>Square</span>
    </nav>

    <div class="px-4 py-3 flex gap-4 text-sm font-semibold text-gray-400 border-b border-gray-800">
        <span class="text-white border-b-2 border-white pb-1">Crypto</span>
        <span>Spot</span>
        <span>USDⓈ-M</span>
        <span>COIN-M</span>
        <span>Options</span>
    </div>

    <div class="px-4 py-3 flex gap-2 overflow-x-auto items-center no-scrollbar border-b border-gray-900/50">
        <span class="filter-pill bg-[#363c45] text-white">All</span>
        <span class="filter-pill">BNB Chain</span>
        <span class="filter-pill">Solana</span>
        <span class="filter-pill">RWA</span>
        <span class="filter-pill">MEME</span>
        <i data-lucide="list" class="w-5 h-5 text-gray-500 ml-auto"></i>
    </div>

    <div class="px-4 py-3 flex justify-between text-[11px] text-gray-500 font-bold uppercase tracking-wider sticky top-0 bg-[#12161c] z-10">
        <div class="flex items-center gap-1 w-[40%]">Name <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
        <div class="flex items-center gap-1">Chart <i data-lucide="bar-chart" class="w-3 h-3"></i></div>
        <div class="flex gap-16">
            <div class="flex items-center gap-1 mr-2">24h Chg%</div>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto no-scrollbar px-4">
        <div id="crypto-list" class="space-y-5 py-2">
            </div>
    </main>

    <footer class="flex justify-around py-3 border-t border-gray-800 bg-[#12161c]">
        <div class="flex flex-col items-center text-gray-500"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] mt-1">Home</span></div>
        <div class="flex flex-col items-center text-[#f0b90b]"><i data-lucide="bar-chart-2" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">Markets</span></div>
        <div class="flex flex-col items-center text-gray-500"><i data-lucide="repeat" class="w-6 h-6"></i><span class="text-[10px] mt-1">Trade</span></div>
        <div class="flex flex-col items-center text-gray-500"><i data-lucide="file-text" class="w-6 h-6"></i><span class="text-[10px] mt-1">Futures</span></div>
        <div class="flex flex-col items-center text-gray-500"><i data-lucide="wallet" class="w-6 h-6"></i><span class="text-[10px] mt-1">Assets</span></div>
    </footer>

    <script>
        const symbols = ['BTC', 'ETH', 'BNB', 'SOL', 'XRP', 'ADA', 'AVAX', 'DOT', 'LINK', 'TRX', 'MATIC', 'NEAR', 'UNI', 'LTC', 'ICP', 'FIL', 'ARB', 'ATOM', 'OP', 'VET', 'RENDER', 'IMX', 'KAS', 'TIA', 'STX', 'INJ', 'GRT', 'THETA', 'LDO', 'ALGO', 'AR', 'FET', 'AGLD', 'SYS', 'YGG', 'ILV', 'FIDA', 'RAD', 'RARE', 'LAZIO', 'ADX', 'ACM', 'ANKR', 'ASR', 'ATA', 'ATM', 'AUDIO', 'AVA', 'AXS', 'BNT'];
        const names = ['Bitcoin', 'Ethereum', 'BNB', 'Solana', 'Ripple', 'Cardano', 'Avalanche', 'Polkadot', 'Chainlink', 'TRON', 'Polygon', 'Near Protocol', 'Uniswap', 'Litecoin', 'Internet Computer', 'Filecoin', 'Arbitrum', 'Cosmos', 'Optimism', 'VeChain', 'Render', 'Immutable', 'Kaspa', 'Celestia', 'Stacks', 'Injective', 'The Graph', 'Theta', 'Lido DAO', 'Algorand', 'Arweave', 'Artificial Super...', 'Adventure Gold', 'Syscoin', 'Yield Guild Games', 'Illuvium', 'Bonfida', 'Radworks', 'SuperRare', 'Lazio Fan Token', 'AdEx', 'AC Milan Fan Token', 'Ankr', 'AS Roma Fan Token', 'Automata', 'Atletico Madrid', 'Audius', 'AVA', 'Axie Infinity', 'Bancor'];

        function generateSparkline(isPositive) {
            const points = Array.from({length: 12}, () => Math.random() * 20 + 5);
            const lineColor = isPositive ? '#2ebd85' : '#f6465d';
            const svgWidth = 80;
            const svgHeight = 25;
            const polylinePoints = points.map((p, i) => `${i * (svgWidth / points.length)}, ${svgHeight - p}`).join(' ');
            return `<svg width="${svgWidth}" height="${svgHeight}"><polyline fill="none" stroke="${lineColor}" stroke-width="1.5" points="${polylinePoints}"/></svg>`;
        }

        let assets = symbols.map((sym, i) => {
            const isPositive = Math.random() < 0.7; // 70% chance of green
            return {
                symbol: sym,
                name: names[i] || sym,
                price: sym === 'BTC' ? 70674.11 : (Math.random() * 100).toFixed(sym === 'AR' || sym === 'ILV' || sym === 'LINK' ? 2 : 4),
                change: (Math.random() * (isPositive ? 10 : -5) + (isPositive ? 0 : -1)).toFixed(2),
                isPositive: isPositive
            }
        });

        const listContainer = document.getElementById('crypto-list');
        const searchInput = document.getElementById('coinSearch');

        function renderList(data) {
            listContainer.innerHTML = '';
            data.forEach((asset, index) => {
                const colorClass = asset.isPositive ? 'price-up-bg' : 'price-down-bg';
                
                listContainer.innerHTML += `
                    <div class="flex justify-between items-center" id="row-${asset.symbol}">
                        <div class="flex items-center gap-3 w-[35%]">
                            <div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center font-bold text-[10px] text-gray-400">${asset.symbol[0]}</div>
                            <div class="truncate">
                                <div class="font-bold text-sm">${asset.symbol}</div>
                                <div class="text-[10px] text-gray-500 truncate">${asset.name}</div>
                            </div>
                        </div>
                        <div class="w-[25%] flex justify-center chart-container">
                            ${generateSparkline(asset.isPositive)}
                        </div>
                        <div class="flex items-center justify-end w-[40%]">
                            <div class="text-right mr-6">
                                <div class="text-sm font-bold text-gray-100 price-val">${parseFloat(asset.price).toLocaleString()}</div>
                                <div class="text-[10px] text-gray-500">$${parseFloat(asset.price).toLocaleString()}</div>
                            </div>
                            <div class="${colorClass} change-pill text-white text-xs font-bold px-3 py-2 rounded-[4px] min-w-[75px] text-center">
                                ${asset.isPositive ? '+' : ''}${asset.change}%
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updatePrices() {
            // Update 3-5 random coins every interval
            const numToUpdate = Math.floor(Math.random() * 3) + 2;
            for(let i=0; i<numToUpdate; i++) {
                const idx = Math.floor(Math.random() * assets.length);
                const asset = assets[idx];
                const row = document.getElementById(`row-${asset.symbol}`);
                if(!row) continue;

                const priceEl = row.querySelector('.price-val');
                const chartEl = row.querySelector('.chart-container');
                const pillEl = row.querySelector('.change-pill');
                
                const oldPrice = parseFloat(asset.price);
                const changeAmt = (oldPrice * (Math.random() * 0.002 - 0.001));
                asset.price = (oldPrice + changeAmt).toFixed(asset.symbol === 'BTC' ? 2 : (asset.symbol === 'AR' || asset.symbol === 'ILV' || asset.symbol === 'LINK' ? 2 : 4));
                
                // Visual feedback
                priceEl.innerText = parseFloat(asset.price).toLocaleString();
                priceEl.classList.remove('price-flash-up', 'price-flash-down');
                void priceEl.offsetWidth; // trigger reflow
                priceEl.classList.add(changeAmt > 0 ? 'price-flash-up' : 'price-flash-down');

                // Update Chart and Pill
                asset.isPositive = changeAmt > 0;
                chartEl.innerHTML = generateSparkline(asset.isPositive);
                pillEl.className = `${asset.isPositive ? 'price-up-bg' : 'price-down-bg'} change-pill text-white text-xs font-bold px-3 py-2 rounded-[4px] min-w-[75px] text-center`;
                pillEl.innerText = `${asset.isPositive ? '+' : ''}${(parseFloat(asset.change) + (Math.random() * 0.05)).toFixed(2)}%`;
            }
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = assets.filter(a => a.symbol.toLowerCase().includes(term) || a.name.toLowerCase().includes(term));
            renderList(filtered);
        });

        renderList(assets);
        setInterval(updatePrices, 2000);
        lucide.createIcons();
    </script>
</body>
</html>
