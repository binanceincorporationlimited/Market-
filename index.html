<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1e2329; /* Exact Binance dark grey */
            color: #eaecef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .text-gray-custom { color: #848e9c; }
        .bg-green-custom { background-color: #2ebd85; }
        .border-b-custom { border-bottom: 1px solid #2b3139; }
        .active-tab { color: #ffffff; border-bottom: 3px solid #f0b90b; }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen pt-10">

    <div class="w-full max-w-md p-4">
        <div class="flex space-x-6 text-sm font-semibold text-gray-custom mb-6 overflow-x-auto whitespace-nowrap pb-2">
            <span>Favorites</span>
            <span class="text-white border-b-2 border-yellow-500 pb-1">Hot</span>
            <span>Alpha</span>
            <span>New</span>
            <span>Gainers</span>
        </div>

        <div class="flex space-x-6 text-lg font-bold mb-4">
            <span class="text-white">Crypto</span>
            <span class="text-gray-custom">Futures</span>
        </div>

        <div class="flex justify-between text-xs text-gray-custom mb-4 px-1">
            <span class="w-1/3">Name</span>
            <span class="w-1/3 text-right">Last Price</span>
            <span class="w-1/3 text-right">24h chg%</span>
        </div>

        <div class="space-y-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center w-1/3">
                    <span class="font-bold text-base">BNB</span>
                    <div class="ml-1 w-3 h-3 bg-yellow-500 rounded-full flex items-center justify-center">
                         <div class="w-1 h-1 bg-white rounded-full"></div>
                    </div>
                </div>
                <div class="text-right w-1/3">
                    <div class="text-base font-medium">633.88</div>
                    <div class="text-xs text-gray-custom">$633.88</div>
                </div>
                <div class="w-1/3 flex justify-end">
                    <div class="bg-green-custom text-white text-sm font-bold py-2 px-3 rounded-md min-w-[85px] text-center">
                        +1.20%
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center w-1/3">
                    <span class="font-bold text-base">BTC</span>
                    <div class="ml-1 w-3 h-3 bg-yellow-500 rounded-full flex items-center justify-center"></div>
                </div>
                <div class="text-right w-1/3">
                    <div class="text-base font-medium">70,551.90</div>
                    <div class="text-xs text-gray-custom">$70,551.90</div>
                </div>
                <div class="w-1/3 flex justify-end">
                    <div class="bg-green-custom text-white text-sm font-bold py-2 px-3 rounded-md min-w-[85px] text-center">
                        +3.80%
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center w-1/3">
                    <span class="font-bold text-base">ETH</span>
                    <div class="ml-1 w-3 h-3 bg-yellow-500 rounded-full flex items-center justify-center"></div>
                </div>
                <div class="text-right w-1/3">
                    <div class="text-base font-medium">2,138.05</div>
                    <div class="text-xs text-gray-custom">$2,138.05</div>
                </div>
                <div class="w-1/3 flex justify-end">
                    <div class="bg-green-custom text-white text-sm font-bold py-2 px-3 rounded-md min-w-[85px] text-center">
                        +4.42%
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="w-1/3 font-bold text-base">SOL</div>
                <div class="text-right w-1/3">
                    <div class="text-base font-medium">90.51</div>
                    <div class="text-xs text-gray-custom">$90.51</div>
                </div>
                <div class="w-1/3 flex justify-end">
                    <div class="bg-green-custom text-white text-sm font-bold py-2 px-3 rounded-md min-w-[85px] text-center">
                        +5.00%
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="w-1/3 font-bold text-base">DOGE</div>
                <div class="text-right w-1/3">
                    <div class="text-base font-medium">0.09361</div>
                    <div class="text-xs text-gray-custom">$0.09361</div>
                </div>
                <div class="w-1/3 flex justify-end">
                    <div class="bg-green-custom text-white text-sm font-bold py-2 px-3 rounded-md min-w-[85px] text-center">
                        +3.40%
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
